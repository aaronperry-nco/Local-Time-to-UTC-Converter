<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Time vs UTC Time Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <style>
        /* Base styling */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .page-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        /* --- PRIMARY LOCAL BOX STYLES --- */
        .time-box {
            background: #ffffff;
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 400px;
            border-top: 4px solid #0056b3;
        }

        .time-box h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            color: #2c3e50;
        }

        .data-group {
            margin-bottom: 1.2rem;
        }

        .time-box .data-group:last-child {
            margin-bottom: 0;
        }

        .label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .value {
            font-size: 1.05rem;
            font-weight: 600;
            background: #f8f9fa;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #e9ecef;
            white-space: nowrap;
            line-height: 1.4; /* Gives comfortable spacing to the stacked lines */
        }

        /* --- LEAFLET INTERACTIVE MAP --- */
        .map-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
            margin-top: 0;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            text-align: center;
        }

        #leaflet-map {
            width: 100%;
            height: 600px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            z-index: 1; 
        }

        /* --- NATIVE MAP TEXT (NO BOXES) --- */
        .map-label-wrapper {
            overflow: visible !important;
        }

        .custom-map-text {
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            white-space: nowrap;
            pointer-events: none; /* Let clicks pass through to the map */
            
            position: absolute;
            transform: translate(-50%, -50%);
            width: max-content;
            
            /* Text shadow creates a glowing white outline so it's readable over map borders */
            text-shadow: 
                -1px -1px 3px rgba(255,255,255,0.9),  
                 1px -1px 3px rgba(255,255,255,0.9),
                -1px  1px 3px rgba(255,255,255,0.9),
                 1px  1px 3px rgba(255,255,255,0.9),
                 0px  0px 5px rgba(255,255,255,1);
        }

        .map-label-title {
            color: #000000;
            font-size: 1.3rem; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }

        .map-data-group {
            margin-bottom: 6px;
        }

        .map-label-text {
            font-size: 1.0rem;
            color: #FF2700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 1px;
        }

        .map-label-value {
            color: #0f172a;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.2; /* Tighter line-height to keep the stacked date and time grouped nicely on the map */
        }

    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="time-box">
            <h2>Your Local Time</h2>
            <div class="data-group">
                <div class="label">Detected Timezone</div>
                <div id="timezone-val" class="value">Loading...</div>
            </div>
            <div class="data-group">
                <div class="label">Local Time</div>
                <div id="local-val" class="value">Loading...</div>
            </div>
            <div class="data-group">
                <div class="label">UTC Time</div>
                <div id="z-val" class="value">Loading...</div>
            </div>
        </div>

        <div class="map-section">
            <h1>CONUS Timezones</h1>
            <div class="subtitle"></div>
            <div id="leaflet-map"></div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        const conusZones = [
            { id: "pacific", tz: "America/Los_Angeles", name: "Pacific" },
            { id: "mountain", tz: "America/Denver", name: "Mountain" },
            { id: "central", tz: "America/Chicago", name: "Central" },
            { id: "eastern", tz: "America/New_York", name: "Eastern" }
        ];

        // --- 1. LEAFLET MAP INIT & GEOJSON ---
        const map = L.map('leaflet-map', { zoomSnap: 0.5 });

        // Lock to CONUS bounds
        map.fitBounds([
            [24.396308, -125.000000],
            [49.384358, -66.934570]  
        ]);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Fetch just the boundaries to draw the shapes on the map
        fetch('CONUS_TZ.geojson')
            .then(response => {
                if (!response.ok) throw new Error("HTTP error " + response.status);
                return response.json();
            })
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#0056b3", weight: 2, fillColor: "#e0f2fe", fillOpacity: 0.4 },
                    interactive: false // Makes the blue shapes completely click-through
                }).addTo(map);
            })
            .catch(error => console.error("Error loading CONUS_TZ.geojson.", error));


        // --- 2. NATIVE MAP TEXT PLACEMENT ---
        // Place raw text exactly in the middle of each landmass
        const mapLabelZones = [
            { id: 'pacific', name: 'Pacific', lat: 39.5, lng: -119.5 },
            { id: 'mountain', name: 'Mountain', lat: 40.0, lng: -108.5 },
            { id: 'central', name: 'Central', lat: 39.0, lng: -92.5 },
            { id: 'eastern', name: 'Eastern', lat: 40.0, lng: -79.0 }
        ];

        mapLabelZones.forEach(zone => {
            const icon = L.divIcon({
                className: 'map-label-wrapper',
                html: `
                    <div class="custom-map-text">
                        <div class="map-label-title">${zone.name}</div>
                        
                        <div class="map-data-group">
                            <div class="map-label-text">Local Time</div>
                            <div class="map-label-value" id="map-${zone.id}-local">Loading...</div>
                        </div>

                        <div class="map-data-group">
                            <div class="map-label-text">UTC Time</div>
                            <div class="map-label-value" id="map-${zone.id}-z">Loading...</div>
                        </div>
                    </div>
                `,
                iconSize: [0, 0],   
                iconAnchor: [0, 0]  
            });
            L.marker([zone.lat, zone.lng], { icon: icon, interactive: false }).addTo(map);
        });


        // --- 3. TIMEZONE CLOCK LOGIC ---
        function pad(number) { return number.toString().padStart(2, '0'); }

        function getFormattedLocalTime(dateObj, timeZoneStr) {
            const options = {
                timeZone: timeZoneStr, year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', hour12: true, timeZoneName: 'short'
            };
            const parts = new Intl.DateTimeFormat('en-US', options).formatToParts(dateObj);
            const p = {};
            parts.forEach(part => p[part.type] = part.value);
            // Insert <br> to stack the date and time
            return `${p.hour}:${p.minute} ${p.dayPeriod} ${p.timeZoneName}`;
        }

        function getFormattedZTime(dateObj) {
            // Insert <br> to stack the date and time
            return `${pad(dateObj.getUTCHours())}${pad(dateObj.getUTCMinutes())}Z`;
        }

        function updateTimeData() {
            const now = new Date();
            const zTimeStr = getFormattedZTime(now);

            // Primary Browser Box (Changed to .innerHTML to render the <br> tag properly)
            const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('timezone-val').textContent = userTimeZone;
            document.getElementById('local-val').innerHTML = getFormattedLocalTime(now, userTimeZone);
            document.getElementById('z-val').innerHTML = zTimeStr;

            conusZones.forEach(zone => {
                const localTimeStr = getFormattedLocalTime(now, zone.tz);
                
                // Update map overlay text (Changed to .innerHTML to render the <br> tag properly)
                const mapLocalEl = document.getElementById(`map-${zone.id}-local`);
                const mapZEl = document.getElementById(`map-${zone.id}-z`);
                
                if (mapLocalEl) mapLocalEl.innerHTML = localTimeStr;
                if (mapZEl) mapZEl.innerHTML = zTimeStr;
            });
        }

        updateTimeData();
        setInterval(updateTimeData, 1000);
    </script>
</body>
</html>
