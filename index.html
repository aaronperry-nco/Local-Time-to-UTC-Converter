<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>local Time to UTC Time Converter</title>
    <style>
        /* Base styles for a clean, fast-loading UI */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }

        /* The Box */
        .time-box {
            background: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }

        /* Styling for the individual data fields */
        .data-group {
            margin-bottom: 1.2rem;
        }

        .label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
            background: #f8f9fa;
            padding: 0.6rem;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
    </style>
</head>
<body>

    <div class="time-box">
        <h2>Time Details</h2>

        <div class="data-group">
            <div class="label">Detected Timezone</div>
            <div id="timezone-val" class="value">Loading...</div>
        </div>

        <div class="data-group">
            <div class="label">Local Date & Time</div>
            <div id="local-val" class="value">Loading...</div>
        </div>

        <div class="data-group">
            <div class="label">UTC Date & Time</div>
            <div id="z-val" class="value">Loading...</div>
        </div>
    </div>

    <script>
        // Helper function to ensure single digits get a leading zero
        function pad(number) {
            return number.toString().padStart(2, '0');
        }

        function updateTimeData() {
            const now = new Date();

            // 1. Determine local timezone (IANA string, e.g., America/New_York)
            const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            document.getElementById('timezone-val').textContent = timeZone;

            // 2. Format local time (MM/DD/YYYY HH:MM AM/PM TZ)
            const localMonth = pad(now.getMonth() + 1);
            const localDay = pad(now.getDate());
            const localYear = now.getFullYear();
            
            let localHours = now.getHours();
            const ampm = localHours >= 12 ? 'PM' : 'AM';
            localHours = localHours % 12;
            localHours = localHours ? localHours : 12; // Convert '0' to '12'
            const localMinutes = pad(now.getMinutes());

            // Extract the short timezone abbreviation (e.g., EST, EDT, PT)
            const tzAbbr = new Intl.DateTimeFormat('en-US', { timeZoneName: 'short' })
                .formatToParts(now)
                .find(part => part.type === 'timeZoneName').value;

            const localFormatted = `${localMonth}/${localDay}/${localYear} ${pad(localHours)}:${localMinutes} ${ampm} ${tzAbbr}`;
            document.getElementById('local-val').textContent = localFormatted;

            // 3. Format Z time (MM/DD/YYYY HH:MM Z) in 24-hour format
            const zMonth = pad(now.getUTCMonth() + 1);
            const zDay = pad(now.getUTCDate());
            const zYear = now.getUTCFullYear();
            const zHours = pad(now.getUTCHours());
            const zMinutes = pad(now.getUTCMinutes());

            const zFormatted = `${zMonth}/${zDay}/${zYear} ${zHours}${zMinutes}Z`;
            document.getElementById('z-val').textContent = zFormatted;
        }

        // Run immediately on page load
        updateTimeData();

        // Update every 1000ms (1 second) to ensure the minute ticks over precisely
        setInterval(updateTimeData, 1000);
    </script>

</body>
</html>
